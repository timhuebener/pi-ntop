services:
  pi-ntop:
    build:
      context: .
      dockerfile: Dockerfile
    image: pi-ntop:local
    restart: unless-stopped
    init: true
    cap_add:
      - NET_RAW
    environment:
      GO_ENV: ${GO_ENV:-production}
      PI_NTOP_HTTP_ADDR: ${PI_NTOP_HTTP_ADDR:-:8090}
      PI_NTOP_DB_PATH: ${PI_NTOP_DB_PATH:-/data/pi-ntop.sqlite}
      PI_NTOP_TRACE_TARGETS: ${PI_NTOP_TRACE_TARGETS:-1.1.1.1,8.8.8.8}
      PI_NTOP_HEALTHCHECK_URL: ${PI_NTOP_HEALTHCHECK_URL:-http://127.0.0.1:8090/healthz}
    volumes:
      - ./data:/data
    expose:
      - "8090"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"$PI_NTOP_HEALTHCHECK_URL\" >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    stop_grace_period: 20s